name: Build Cloud Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      variant:
        description: 'Image variant (full or minimal)'
        default: 'full'
        type: choice
        options:
          - full
          - minimal
  schedule:
    - cron: '0 6 * * 0'  # weekly Sunday 06:00 UTC rebuild

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap qemu-utils parted rsync \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed shim-signed \
            dosfstools

      - name: Build image
        run: |
          sudo VARIANT=${{ inputs.variant || 'full' }} bash build.sh 2>&1 | tee build.log
          mkdir -p output
          sudo mv /output/*.qcow2 output/ 2>/dev/null
          sudo chown "$(whoami):$(whoami)" output/*.qcow2 2>/dev/null || true
          ls -lh output/

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: veilbox-cloud-amd64-${{ inputs.variant || 'full' }}
          path: output/*.qcow2
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log-amd64
          path: build.log
          retention-days: 30

      - name: Upload to Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VARIANT=${{ inputs.variant || 'full' }}
          RELEASE_TAG="v1.0.0"
          [ "$VARIANT" = "minimal" ] && RELEASE_TAG="v1.0.0-minimal"
          gzip -k output/*.qcow2
          NOTES="## Veilbox Cloud v1.0.0 ($VARIANT, amd64)
          Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Debian trixie cloud kernel, gzip compressed
          "
          if gh release view "$RELEASE_TAG" --repo Shreyas0047/veilbox-cloud &>/dev/null; then
            gh release upload "$RELEASE_TAG" output/*.qcow2.gz --repo Shreyas0047/veilbox-cloud --clobber
          else
            gh release create "$RELEASE_TAG" output/*.qcow2.gz --repo Shreyas0047/veilbox-cloud \
              --title "Veilbox Cloud v1.0.0 ($VARIANT)" --notes "$NOTES"
          fi

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap qemu-utils parted rsync \
            grub-efi-arm64-bin grub-efi-arm64-signed shim-signed \
            dosfstools

      - name: Build image
        run: |
          sudo ARCH=arm64 VARIANT=${{ inputs.variant || 'full' }} bash build.sh 2>&1 | tee build.log
          mkdir -p output
          sudo mv /output/*.qcow2 output/ 2>/dev/null
          sudo chown "$(whoami):$(whoami)" output/*.qcow2 2>/dev/null || true
          ls -lh output/

      - name: Upload image
        uses: actions/upload-artifact@v4
        with:
          name: veilbox-cloud-arm64-${{ inputs.variant || 'full' }}
          path: output/*.qcow2
          retention-days: 30

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log-arm64
          path: build.log
          retention-days: 30

      - name: Upload to Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VARIANT=${{ inputs.variant || 'full' }}
          RELEASE_TAG="v1.0.0-arm64"
          [ "$VARIANT" = "minimal" ] && RELEASE_TAG="v1.0.0-minimal-arm64"
          gzip -k output/*.qcow2
          NOTES="## Veilbox Cloud v1.0.0 ($VARIANT, arm64)
          Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Debian trixie cloud kernel, gzip compressed
          "
          if gh release view "$RELEASE_TAG" --repo Shreyas0047/veilbox-cloud &>/dev/null; then
            gh release upload "$RELEASE_TAG" output/*.qcow2.gz --repo Shreyas0047/veilbox-cloud --clobber
          else
            gh release create "$RELEASE_TAG" output/*.qcow2.gz --repo Shreyas0047/veilbox-cloud \
              --title "Veilbox Cloud v1.0.0 ($VARIANT, ARM64)" --notes "$NOTES"
          fi
